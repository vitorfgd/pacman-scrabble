<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PacMan Scrabble</title>
  </head>
  <body>
    <div id="app">
      <!-- Three.js canvas -->
      <div id="game"></div>

      <!-- Score — top center, large and prominent -->
      <div id="scoreDisplay">
        <div class="score-label">SCORE</div>
        <div id="score" class="score-value">0</div>
      </div>

      <!-- Top-right HUD: quest multiplier + reset button + power mode -->
      <div id="hud">
        <div class="hud-row">
          <span class="hud-label">Quest multiplier</span>
          <span id="questMult" class="wod"></span>
        </div>
        <div class="hud-row">
          <button id="resetTray" class="hud-button" type="button">Reset Tray (R)</button>
        </div>
        <div class="hud-row hud-muted">
          <span id="powerMode" class="power-mode"></span>
        </div>
      </div>

      <!-- Left rail: current quest -->
      <div class="hud-possible">
        <div class="hud-label-small">QUEST</div>
        <div id="questPanel" class="possible-words"></div>
      </div>

      <!-- Floating tray — positioned via JS to follow the player -->
      <div id="tray" class="tray" aria-label="Collected letters"></div>

      <!-- Word completion: confetti + praise (filled by JS) -->
      <div id="wordCelebration" class="word-celebration-root" aria-hidden="true"></div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
